<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KT Admin | Full Screen</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #EBEAE6; margin: 0; padding: 0; }
        
        .main-viewport { height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #2D3A32;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 100;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }

        #sidebar {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { transform: translateY(0); }

        .nav-btn {
            width: 80%;
            padding: 20px;
            margin: 10px 0;
            border-radius: 20px;
            background: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-weight: 600;
            color: #2D3A32;
        }
    </style>
</head>
<body>

    <div class="main-viewport">
        <div id="home-view" class="h-full w-full flex flex-col items-center justify-center p-8 text-center bg-[#F9F7F2]">
            <h1 class="text-3xl font-bold text-[#2D3A32] mb-2 uppercase tracking-tighter">Karen Trujillo</h1>
            <p class="text-[#96715E] text-xs font-bold tracking-[3px] mb-12">ADMIN STUDIO</p>
            
            <div class="grid w-full gap-0 max-w-xs">
                <button onclick="loadPage('agenda')" class="bg-[#2D3A32] text-white p-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg mb-4">
                    <i class="fas fa-calendar-alt"></i> Gestionar Agenda
                </button>

                <div class="bg-gray-100 text-[#2D3A32] p-5 rounded-t-2xl flex items-center justify-center gap-3 border-x border-t border-gray-200 opacity-60">
                    <i class="fas fa-credit-card"></i> Datos de Pago
                </div>

                <div class="grid grid-cols-2 gap-0 border-x border-b border-gray-200 rounded-b-2xl overflow-hidden shadow-sm">
                    <a href="https://psicologakarentrujillo.com.mx/cuentas" target="_blank" class="bg-white text-[#2D3A32] p-4 flex items-center justify-center gap-2 font-semibold text-sm border-r border-gray-100">
                        <i class="fas fa-eye"></i> Ver
                    </a>
                    <button onclick="shareLink()" class="bg-white text-[#2D3A32] p-4 flex items-center justify-center gap-2 font-semibold text-sm">
                        <i class="fas fa-share-alt"></i> Compartir
                    </button>
                </div>
            </div>
        </div>

        <div id="frame-container" class="hidden h-full w-full">
            <iframe id="app-frame" src=""></iframe>
        </div>
    </div>

    <div id="menu-fab" class="fab hidden" onclick="toggleMenu()">
        <i class="fas fa-th-large text-xl"></i>
    </div>

    <div id="sidebar">
        <button onclick="toggleMenu()" class="absolute top-10 right-10 text-2xl text-gray-400 p-2">
            <i class="fas fa-times"></i>
        </button>

        <h2 class="text-xs font-bold text-[#96715E] tracking-[5px] uppercase mb-10">Menú Principal</h2>
        
        <button onclick="loadPage('home')" class="nav-btn text-red-500">
            <i class="fas fa-home"></i> Inicio / Salir
        </button>
        <button onclick="loadPage('agenda')" class="nav-btn">
            <i class="fas fa-calendar-day"></i> Mi Agenda
        </button>
        <button onclick="window.open('https://psicologakarentrujillo.com.mx/cuentas', '_blank')" class="nav-btn">
            <i class="fas fa-wallet"></i> Ver Cuentas
        </button>
    </div>

    <script>
        const frame = document.getElementById('app-frame');
        const frameContainer = document.getElementById('frame-container');
        const homeView = document.getElementById('home-view');
        const sidebar = document.getElementById('sidebar');
        const fab = document.getElementById('menu-fab');

        function loadPage(page) {
            if (page === 'home') {
                homeView.classList.remove('hidden');
                frameContainer.classList.add('hidden');
                fab.classList.add('hidden');
                frame.src = ''; 
            } else {
                homeView.classList.add('hidden');
                frameContainer.classList.remove('hidden');
                fab.classList.remove('hidden');
                
                if (page === 'agenda') {
                    frame.src = 'herramienta-agenda.html';
                }
            }
            toggleMenu(false);
        }

        function toggleMenu(force) {
            if (force === false) {
                sidebar.classList.remove('open');
            } else {
                sidebar.classList.toggle('open');
            }
        }

        function shareLink() {
            const shareData = {
                title: 'Datos de Pago - Psic. Karen Trujillo',
                text: 'Hola, te comparto los datos bancarios para el pago de la sesión:',
                url: 'https://psicologakarentrujillo.com.mx/cuentas'
            }

            if (navigator.share) {
                navigator.share(shareData).catch((error) => console.log('Error compartiendo', error));
            } else {
                navigator.clipboard.writeText(shareData.url);
                alert("Enlace copiado al portapapeles.");
            }
        }
    </script>
</body>
</html>
